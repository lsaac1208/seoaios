{% extends "base.html" %}

{% block title %}新建站点 - SEO AIOS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">新建站点</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('sites.new') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="name" class="form-label">站点名称 *</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="domain" class="form-label">域名 *</label>
                        <input type="url" class="form-control" id="domain" name="domain" placeholder="https://example.com" required>
                        <small class="text-muted">输入完整的域名，包含https://</small>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">站点描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="keywords" class="form-label">关键词</label>
                        <input type="text" class="form-control" id="keywords" name="keywords" placeholder="关键词1, 关键词2, 关键词3">
                        <small class="text-muted">多个关键词用逗号分隔</small>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="template" class="form-label">模板</label>
                            <select class="form-select" id="template" name="template">
                                <option value="default">默认模板</option>
                                {% for t in templates %}
                                <option value="{{ t.path }}">{{ t.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="output_type" class="form-label">输出类型</label>
                            <select class="form-select" id="output_type" name="output_type">
                                <option value="static">静态HTML</option>
                                <option value="dynamic">动态CMS</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="language" class="form-label">语言</label>
                        <select class="form-select" id="language" name="language">
                            <option value="zh-CN" selected>简体中文</option>
                            <option value="zh-TW">繁体中文</option>
                            <option value="en-US">English</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('sites.index') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">创建站点</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
