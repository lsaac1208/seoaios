{% extends "base.html" %}

{% block title %}站点设置 - SEO AIOS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>站点设置 - {{ site.name }}</h2>
    <a href="{{ url_for('sites.detail', site_id=site.id) }}" class="btn btn-secondary">返回</a>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">SEO配置</h5>
            </div>
            <div class="card-body">
                <a href="{{ url_for('seo.settings', site_id=site.id) }}" class="btn btn-primary">
                    SEO设置
                </a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">AI配置</h5>
            </div>
            <div class="card-body">
                <a href="{{ url_for('ai.settings', site_id=site.id) }}" class="btn btn-primary">
                    AI设置
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
