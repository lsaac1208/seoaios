{% extends "base.html" %}

{% block title %}编辑站点 - SEO AIOS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">编辑站点</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('sites.edit', site_id=site.id) }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="name" class="form-label">站点名称 *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ site.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="domain" class="form-label">域名 *</label>
                        <input type="url" class="form-control" id="domain" name="domain" value="{{ site.domain }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">站点描述</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ site.description or '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label for="keywords" class="form-label">关键词</label>
                        <input type="text" class="form-control" id="keywords" name="keywords" value="{{ site.keywords or '' }}">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="template" class="form-label">模板</label>
                            <select class="form-select" id="template" name="template">
                                <option value="default" {{ 'selected' if site.template == 'default' else '' }}>默认模板</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="output_type" class="form-label">输出类型</label>
                            <select class="form-select" id="output_type" name="output_type">
                                <option value="static" {{ 'selected' if site.output_type == 'static' else '' }}>静态HTML</option>
                                <option value="dynamic" {{ 'selected' if site.output_type == 'dynamic' else '' }}>动态CMS</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="language" class="form-label">语言</label>
                            <select class="form-select" id="language" name="language">
                                <option value="zh-CN" {{ 'selected' if site.language == 'zh-CN' else '' }}>简体中文</option>
                                <option value="zh-TW" {{ 'selected' if site.language == 'zh-TW' else '' }}>繁体中文</option>
                                <option value="en-US" {{ 'selected' if site.language == 'en-US' else '' }}>English</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="timezone" class="form-label">时区</label>
                            <select class="form-select" id="timezone" name="timezone">
                                <option value="Asia/Shanghai" {{ 'selected' if site.timezone == 'Asia/Shanghai' else '' }}>Asia/Shanghai</option>
                                <option value="Asia/Tokyo" {{ 'selected' if site.timezone == 'Asia/Tokyo' else '' }}>Asia/Tokyo</option>
                                <option value="America/New_York" {{ 'selected' if site.timezone == 'America/New_York' else '' }}>America/New_York</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">状态</label>
                        <select class="form-select" id="status" name="status">
                            <option value="active" {{ 'selected' if site.status == 'active' else '' }}>活跃</option>
                            <option value="inactive" {{ 'selected' if site.status == 'inactive' else '' }}>停用</option>
                            <option value="pending" {{ 'selected' if site.status == 'pending' else '' }}>待审核</option>
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('sites.detail', site_id=site.id) }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
