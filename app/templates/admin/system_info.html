{% extends "base.html" %}

{% block title %}系统信息 - SEO AIOS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>系统信息</h2>
            <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">返回后台</a>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table">
                    <tr>
                        <th>Python 版本</th>
                        <td>{{ info.python_version }}</td>
                    </tr>
                    <tr>
                        <th>平台</th>
                        <td>{{ info.platform }}</td>
                    </tr>
                    <tr>
                        <th>架构</th>
                        <td>{{ info.architecture }}</td>
                    </tr>
                    <tr>
                        <th>处理器</th>
                        <td>{{ info.processor }}</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
