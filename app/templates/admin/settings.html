{% extends "base.html" %}

{% block title %}系统设置 - SEO AIOS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>系统设置</h2>
            <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">返回后台</a>
        </div>

        <form method="POST">
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">基本设置</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">系统名称</label>
                        <input type="text" name="site_name" class="form-control" value="{{ settings.get('site_name', 'SEO AIOS') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">系统描述</label>
                        <textarea name="site_description" class="form-control" rows="3">{{ settings.get('site_description', '') }}</textarea>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">用户设置</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="allow_register" class="form-check-input" id="allow_register" {% if settings.get('allow_register') == 'on' %}checked{% endif %}>
                            <label class="form-check-label" for="allow_register">允许用户注册</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" name="email_verification" class="form-check-input" id="email_verification" {% if settings.get('email_verification') == 'on' %}checked{% endif %}>
                            <label class="form-check-label" for="email_verification">需要邮箱验证</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">内容设置</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">默认文章字数</label>
                        <input type="number" name="default_article_length" class="form-control" value="{{ settings.get('default_article_length', '1500') }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">每站点最大站点数</label>
                        <input type="number" name="max_sites_per_user" class="form-control" value="{{ settings.get('max_sites_per_user', '10') }}">
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">AI 设置</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">默认 AI 提供商</label>
                        <select name="default_ai_provider" class="form-select">
                            <option value="openai" {% if settings.get('default_ai_provider') == 'openai' %}selected{% endif %}>OpenAI</option>
                            <option value="anthropic" {% if settings.get('default_ai_provider') == 'anthropic' %}selected{% endif %}>Anthropic</option>
                            <option value="deepseek" {% if settings.get('default_ai_provider') == 'deepseek' %}selected{% endif %}>DeepSeek</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存设置</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
