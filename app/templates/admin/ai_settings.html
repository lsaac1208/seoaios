{% extends "base.html" %}

{% block title %}AI 配置 - SEO AIOS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>AI 配置</h2>
            <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">返回后台</a>
        </div>

        <form method="POST">
            <!-- OpenAI -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-robot"></i> OpenAI</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">API Key</label>
                                <input type="password" name="openai_api_key" class="form-control" value="{{ settings.openai_api_key or '' }}" placeholder="sk-...">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">API Base URL</label>
                                <input type="text" name="openai_api_base" class="form-control" value="{{ settings.openai_api_base or 'https://api.openai.com/v1' }}" placeholder="https://api.openai.com/v1">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">默认模型</label>
                        <select name="openai_model" class="form-select">
                            <option value="gpt-4o" {% if settings.openai_model == 'gpt-4o' %}selected{% endif %}>GPT-4o</option>
                            <option value="gpt-4-turbo" {% if settings.openai_model == 'gpt-4-turbo' %}selected{% endif %}>GPT-4 Turbo</option>
                            <option value="gpt-3.5-turbo" {% if settings.openai_model == 'gpt-3.5-turbo' or not settings.openai_model %}selected{% endif %}>GPT-3.5 Turbo</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Anthropic -->
            <div class="card mb-4">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="bi bi-cpu"></i> Anthropic Claude</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">API Key</label>
                                <input type="password" name="anthropic_api_key" class="form-control" value="{{ settings.anthropic_api_key or '' }}" placeholder="sk-ant-...">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">默认模型</label>
                                <select name="anthropic_model" class="form-select">
                                    <option value="claude-3-5-sonnet-20241022" {% if settings.anthropic_model == 'claude-3-5-sonnet-20241022' %}selected{% endif %}>Claude 3.5 Sonnet</option>
                                    <option value="claude-3-opus-20240229" {% if settings.anthropic_model == 'claude-3-opus-20240229' %}selected{% endif %}>Claude 3 Opus</option>
                                    <option value="claude-3-haiku-20240307" {% if settings.anthropic_model == 'claude-3-haiku-20240307' or not settings.anthropic_model %}selected{% endif %}>Claude 3 Haiku</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DeepSeek -->
            <div class="card mb-4">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="bi bi-lightning"></i> DeepSeek</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">API Key</label>
                                <input type="password" name="deepseek_api_key" class="form-control" value="{{ settings.deepseek_api_key or '' }}" placeholder="sk-...">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">默认模型</label>
                                <select name="deepseek_model" class="form-select">
                                    <option value="deepseek-chat" {% if settings.deepseek_model == 'deepseek-chat' or not settings.deepseek_model %}selected{% endif %}>DeepSeek Chat</option>
                                    <option value="deepseek-coder" {% if settings.deepseek_model == 'deepseek-coder' %}selected{% endif %}>DeepSeek Coder</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- MiniMax -->
            <div class="card mb-4">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0"><i class="bi bi-gem"></i> MiniMax</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">API Key</label>
                                <input type="password" name="minimax_api_key" class="form-control" value="{{ settings.minimax_api_key or '' }}" placeholder="your-minimax-api-key">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">Group ID</label>
                                <input type="text" name="minimax_group_id" class="form-control" value="{{ settings.minimax_group_id or '' }}" placeholder="your-group-id">
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">默认模型</label>
                        <select name="minimax_model" class="form-select">
                            <option value="abab6.5s-chat" {% if settings.minimax_model == 'abab6.5s-chat' or not settings.minimax_model %}selected{% endif %}>abab6.5s-chat</option>
                            <option value="abab6-chat" {% if settings.minimax_model == 'abab6-chat' %}selected{% endif %}>abab6-chat</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Google Gemini -->
            <div class="card mb-4">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="bi bi-google"></i> Google Gemini</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">API Key</label>
                                <input type="password" name="gemini_api_key" class="form-control" value="{{ settings.gemini_api_key or '' }}" placeholder="your-gemini-api-key">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label class="form-label">默认模型</label>
                                <select name="gemini_model" class="form-select">
                                    <option value="gemini-1.5-pro" {% if settings.gemini_model == 'gemini-1.5-pro' %}selected{% endif %}>Gemini 1.5 Pro</option>
                                    <option value="gemini-1.5-flash" {% if settings.gemini_model == 'gemini-1.5-flash' or not settings.gemini_model %}selected{% endif %}>Gemini 1.5 Flash</option>
                                    <option value="gemini-pro" {% if settings.gemini_model == 'gemini-pro' %}selected{% endif %}>Gemini Pro</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Azure OpenAI -->
            <div class="card mb-4">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0"><i class="bi bi-cloud"></i> Azure OpenAI</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">API Key</label>
                                <input type="password" name="azure_api_key" class="form-control" value="{{ settings.azure_api_key or '' }}">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">Endpoint</label>
                                <input type="text" name="azure_api_base" class="form-control" value="{{ settings.azure_api_base or '' }}" placeholder="https://your-resource.openai.azure.com">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">Deployment Name</label>
                                <input type="text" name="azure_deployment" class="form-control" value="{{ settings.azure_deployment or '' }}">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 默认设置 -->
            <div class="card mb-4">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="bi bi-gear"></i> 默认设置</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">默认 AI 提供商</label>
                                <select name="default_provider" class="form-select">
                                    <option value="openai" {% if settings.default_provider == 'openai' or not settings.default_provider %}selected{% endif %}>OpenAI</option>
                                    <option value="anthropic" {% if settings.default_provider == 'anthropic' %}selected{% endif %}>Anthropic</option>
                                    <option value="deepseek" {% if settings.default_provider == 'deepseek' %}selected{% endif %}>DeepSeek</option>
                                    <option value="minimax" {% if settings.default_provider == 'minimax' %}selected{% endif %}>MiniMax</option>
                                    <option value="gemini" {% if settings.default_provider == 'gemini' %}selected{% endif %}>Google Gemini</option>
                                    <option value="azure" {% if settings.default_provider == 'azure' %}selected{% endif %}>Azure OpenAI</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">Temperature</label>
                                <input type="number" name="temperature" class="form-control" value="{{ settings.temperature or 0.7 }}" step="0.1" min="0" max="2">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label class="form-label">默认文章长度</label>
                                <input type="number" name="default_article_length" class="form-control" value="{{ settings.default_article_length or 1500 }}">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-primary">保存配置</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
