{% extends "base.html" %}

{% block title %}SEO设置 - SEO AIOS{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>SEO设置 - {{ site.name }}</h2>
</div>

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">基础SEO设置</h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label for="default_title" class="form-label">默认标题</label>
                <input type="text" class="form-control" id="default_title" name="default_title" value="{{ seo_config.default_title or '' }}">
            </div>
            <div class="mb-3">
                <label for="default_description" class="form-label">默认描述</label>
                <textarea class="form-control" id="default_description" name="default_description" rows="3">{{ seo_config.default_description or '' }}</textarea>
            </div>
            <div class="mb-3">
                <label for="default_keywords" class="form-label">默认关键词</label>
                <input type="text" class="form-control" id="default_keywords" name="default_keywords" value="{{ seo_config.default_keywords or '' }}">
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">站点地图</h5>
        </div>
        <div class="card-body">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="enable_sitemap" name="enable_sitemap" {{ 'checked' if seo_config.enable_sitemap else '' }}>
                <label class="form-check-label" for="enable_sitemap">
                    启用站点地图
                </label>
            </div>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">结构化数据</h5>
        </div>
        <div class="card-body">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="enable_schema" name="enable_schema" {{ 'checked' if seo_config.enable_schema else '' }}>
                <label class="form-check-label" for="enable_schema">
                    启用Schema.org结构化数据
                </label>
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-primary">保存设置</button>
</form>
{% endblock %}
