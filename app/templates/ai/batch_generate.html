{% extends "base.html" %}

{% block title %}批量生成 - SEO AIOS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-collection"></i> 批量生成内容</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('ai.batch_generate') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="site_id" class="form-label">目标站点 *</label>
                        <select class="form-select" id="site_id" name="site_id" required>
                            <option value="">选择站点</option>
                            {% for site in sites %}
                            <option value="{{ site.id }}">{{ site.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="keywords" class="form-label">关键词列表 *</label>
                        <textarea class="form-control" id="keywords" name="keywords" rows="10" placeholder="每行一个关键词" required></textarea>
                        <small class="text-muted">每行一个关键词，系统将逐个生成文章</small>
                    </div>

                    <div class="mb-3">
                        <label for="count" class="form-label">生成数量</label>
                        <input type="number" class="form-control" id="count" name="count" value="5" min="1" max="20">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-play"></i> 开始批量生成
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
