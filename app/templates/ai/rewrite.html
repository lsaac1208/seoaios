{% extends "base.html" %}

{% block title %}内容改写 - SEO AIOS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-pencil-square"></i> AI内容改写</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('ai.rewrite_content') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="content" class="form-label">要改写的内容</label>
                        <textarea class="form-control" id="content" name="content" rows="10" required></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="rewrite_type" class="form-label">改写类型</label>
                            <select class="form-select" id="rewrite_type" name="rewrite_type">
                                <option value="semantic">语义保持</option>
                                <option value="paraphrasing">意译改写</option>
                                <option value="humanize">人性化</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="level" class="form-label">改写程度</label>
                            <select class="form-select" id="level" name="level">
                                <option value="1">轻度 (1)</option>
                                <option value="2">中轻度 (2)</option>
                                <option value="3" selected>中等 (3)</option>
                                <option value="4">深度 (4)</option>
                                <option value="5">完全重写 (5)</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-stars"></i> 开始改写
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
