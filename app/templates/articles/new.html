{% extends "base.html" %}

{% block title %}新建文章 - SEO AIOS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">新建文章</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('articles.new') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div class="mb-3">
                        <label for="site_id" class="form-label">站点 *</label>
                        <select class="form-select" id="site_id" name="site_id" required>
                            <option value="">选择站点</option>
                            {% for site in sites %}
                            <option value="{{ site.id }}">{{ site.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="title" class="form-label">标题 *</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>

                    <div class="mb-3">
                        <label for="content" class="form-label">内容 *</label>
                        <textarea class="form-control" id="content" name="content" rows="15" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="excerpt" class="form-label">摘要</label>
                        <textarea class="form-control" id="excerpt" name="excerpt" rows="2"></textarea>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="category_id" class="form-label">分类</label>
                            <select class="form-select" id="category_id" name="category_id">
                                <option value="">选择分类</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}">{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="status" class="form-label">状态</label>
                            <select class="form-select" id="status" name="status">
                                <option value="draft">草稿</option>
                                <option value="published">已发布</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="tags" class="form-label">标签</label>
                        <input type="text" class="form-control" id="tags" name="tags" placeholder="标签1, 标签2">
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('articles.index') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">创建</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
