[pytest]
# pytest配置文件

# 测试目录
testpaths = tests

# Python文件匹配
python_files = test_*.py

# 测试类匹配
python_classes = Test*

# 测试函数匹配
python_functions = test_*

# 添加项目路径
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    api: API测试
